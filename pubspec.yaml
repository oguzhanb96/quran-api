name: hidaya
description: "Hidaya: Prayer Times, Quran & Duas"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
environment:
  sdk: '>=3.11.0 <4.0.0'

version: 1.0.1+2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: any

  # App dependencies (versions will be resolved automatically by `flutter pub get`)
  firebase_core: any
  flutter_riverpod: any
  riverpod: any
  intl: any
  google_fonts: any
  go_router: any
  flutter_tts: any
  geolocator: any
  sensors_plus: any
  dio: any
  crypto: ^3.0.6
  just_audio: any
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_animate: ^4.5.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  share_plus: ^12.0.2
  path_provider: any
  flutter_displaymode: ^0.7.0
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/content/pillars_islam/tr.json
    - assets/content/pillars_faith/tr.json
    - assets/content/esmaul_husna/tr.json
    - assets/content/six_kalima/tr.json
    - assets/content/siyer/tr.json
    - assets/content/fiqh_basics/tr.json
    - assets/content/terms/tr.json
    - assets/content/interesting_facts/tr.json
